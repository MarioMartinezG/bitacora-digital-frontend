<p-toast />
<p-confirmdialog [style]="{ width: '450px' }" />

<p-toolbar styleClass="mb-6">
  <ng-template #start>
    <p-button label="Nuevo usuario" icon="pi pi-plus" severity="secondary" (click)="nuevoUsuario()" />
  </ng-template>
</p-toolbar>

<p-table
  #dt
  [value]="usuarios()"
  [rows]="10"
  [paginator]="true"
  [globalFilterFields]="['nombre', 'correo']"
  [loading]="cargando()"
  [rowHover]="true"
  dataKey="id"
  [tableStyle]="{ 'min-width': '70rem' }">

  <ng-template #caption>
    <div class="flex items-center justify-between">
      <h5 class="m-0">Gestión de Usuarios</h5>
      <p-iconfield>
        <p-inputicon styleClass="pi pi-search" />
        <input pInputText type="text"
               (input)="dt.filterGlobal($any($event.target).value, 'contains')"
               placeholder="Buscar por nombre o correo..." />
      </p-iconfield>
    </div>
  </ng-template>

  <ng-template #header>
    <tr>
      <th pSortableColumn="nombre" style="min-width: 12rem">
        Nombre <p-sortIcon field="nombre" />
      </th>
      <th pSortableColumn="correo" style="min-width: 14rem">
        Correo <p-sortIcon field="correo" />
      </th>
      <th style="min-width: 10rem">Roles</th>
      <th pSortableColumn="activo" style="min-width: 6rem">
        Estado <p-sortIcon field="activo" />
      </th>
      <th style="min-width: 10rem">Último acceso</th>
      <th style="min-width: 10rem">Acciones</th>
    </tr>
  </ng-template>

  <ng-template #body let-usuario>
    <tr>
      <td>{{ usuario.nombre }}</td>
      <td>{{ usuario.correo }}</td>
      <td>
        @for (rolId of usuario.roles; track rolId) {
          <p-tag class="mr-1"
                 [value]="getRolLabel(rolId)"
                 [severity]="getRolSeverity(rolId)" />
        }
      </td>
      <td>
        <p-tag [value]="usuario.activo ? 'Activo' : 'Inactivo'"
               [severity]="getEstadoSeverity(usuario.activo)" />
      </td>
      <td>{{ formatFecha(usuario.ultimoAcceso) }}</td>
      <td>
        <p-button icon="pi pi-eye" class="mr-2"
                  [rounded]="true" [outlined]="true" severity="info"
                  (click)="verDetalle(usuario)"
                  pTooltip="Ver detalle" />
        <p-button icon="pi pi-pencil" class="mr-2"
                  [rounded]="true" [outlined]="true"
                  (click)="editarUsuario(usuario)"
                  pTooltip="Editar" />
        <p-button [icon]="usuario.activo ? 'pi pi-lock' : 'pi pi-lock-open'"
                  [rounded]="true" [outlined]="true"
                  [severity]="usuario.activo ? 'danger' : 'success'"
                  (click)="confirmarToggleActivo(usuario)"
                  [pTooltip]="usuario.activo ? 'Desactivar' : 'Activar'" />
      </td>
    </tr>
  </ng-template>

  <ng-template #loadingbody>
    <tr>
      <td><p-skeleton /></td>
      <td><p-skeleton /></td>
      <td><p-skeleton width="8rem" /></td>
      <td><p-skeleton width="5rem" /></td>
      <td><p-skeleton width="9rem" /></td>
      <td>
        <div class="flex gap-2">
          <p-skeleton shape="circle" size="2.5rem" />
          <p-skeleton shape="circle" size="2.5rem" />
          <p-skeleton shape="circle" size="2.5rem" />
        </div>
      </td>
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td colspan="6" class="text-center p-8">
        <div class="flex flex-col items-center gap-3">
          <i class="pi pi-users text-4xl text-gray-400"></i>
          <p class="text-gray-500 m-0">No se encontraron usuarios</p>
          <p-button label="Crear primer usuario" icon="pi pi-plus" size="small" (click)="nuevoUsuario()" />
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
