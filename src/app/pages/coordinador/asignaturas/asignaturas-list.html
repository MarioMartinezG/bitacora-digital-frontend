<p-toast />
<p-confirmDialog />

<p-toolbar styleClass="mb-6">
  <ng-template #start>
    <p-button
      label="Nueva Asignatura"
      icon="pi pi-plus"
      (onClick)="nuevaAsignatura()"
    />
  </ng-template>
  <ng-template #end>
    <p-button
      icon="pi pi-refresh"
      severity="secondary"
      [outlined]="true"
      (onClick)="loadAsignaturas()"
      pTooltip="Actualizar lista"
    />
  </ng-template>
</p-toolbar>

<p-table
  #dt
  [value]="asignaturas()"
  [rows]="10"
  [paginator]="true"
  [rowsPerPageOptions]="[10, 25, 50]"
  [globalFilterFields]="['nombre', 'codigo', 'descripcion']"
  [loading]="cargando()"
  [rowHover]="true"
  [tableStyle]="{ 'min-width': '70rem' }"
  [showCurrentPageReport]="true"
  currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} asignaturas"
>
  <ng-template #caption>
    <div class="flex items-center justify-between">
      <h5 class="m-0">Asignaturas</h5>
      <p-iconfield>
        <p-inputicon styleClass="pi pi-search" />
        <input pInputText type="text"
               (input)="dt.filterGlobal($any($event.target).value, 'contains')"
               placeholder="Buscar asignatura..." />
      </p-iconfield>
    </div>
  </ng-template>

  <ng-template #header>
    <tr>
      <th pSortableColumn="codigo" style="min-width: 8rem">
        Código <p-sortIcon field="codigo" />
      </th>
      <th pSortableColumn="nombre" style="min-width: 14rem">
        Nombre <p-sortIcon field="nombre" />
      </th>
      <th style="min-width: 12rem">Descripción</th>
      <th pSortableColumn="totalEstudiantes" style="min-width: 8rem">
        Estudiantes <p-sortIcon field="totalEstudiantes" />
      </th>
      <th pSortableColumn="totalTutores" style="min-width: 8rem">
        Tutores <p-sortIcon field="totalTutores" />
      </th>
      <th pSortableColumn="activa" style="min-width: 8rem">
        Estado <p-sortIcon field="activa" />
      </th>
      <th style="min-width: 10rem">Acciones</th>
    </tr>
  </ng-template>

  <ng-template #body let-asignatura>
    <tr>
      <td><span class="font-mono font-semibold">{{ asignatura.codigo }}</span></td>
      <td>
        <span class="font-medium">{{ asignatura.nombre }}</span>
        @if (asignatura.creditos) {
          <div class="text-sm text-surface-500">{{ asignatura.creditos }} créditos</div>
        }
      </td>
      <td>
        <span class="text-sm text-surface-500">{{ asignatura.descripcion || 'Sin descripción' }}</span>
      </td>
      <td>
        <p-tag [value]="asignatura.totalEstudiantes.toString()" severity="info" />
      </td>
      <td>
        <p-tag [value]="asignatura.totalTutores.toString()" severity="secondary" />
      </td>
      <td>
        <p-tag
          [value]="asignatura.activa ? 'Activa' : 'Inactiva'"
          [severity]="getEstadoSeverity(asignatura.activa)"
        />
      </td>
      <td>
        <div class="flex gap-2">
          <p-button
            icon="pi pi-eye"
            [rounded]="true"
            [outlined]="true"
            severity="info"
            size="small"
            (onClick)="verDetalle(asignatura)"
            pTooltip="Ver detalle"
          />
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [outlined]="true"
            severity="warn"
            size="small"
            (onClick)="editarAsignatura(asignatura)"
            pTooltip="Editar"
          />
          <p-button
            [icon]="asignatura.activa ? 'pi pi-ban' : 'pi pi-check'"
            [rounded]="true"
            [outlined]="true"
            [severity]="asignatura.activa ? 'danger' : 'success'"
            size="small"
            (onClick)="confirmarToggleActiva(asignatura)"
            [pTooltip]="asignatura.activa ? 'Desactivar' : 'Activar'"
          />
        </div>
      </td>
    </tr>
  </ng-template>

  <ng-template #loadingbody>
    <tr>
      <td><p-skeleton /></td>
      <td><p-skeleton /></td>
      <td><p-skeleton /></td>
      <td><p-skeleton width="3rem" /></td>
      <td><p-skeleton width="3rem" /></td>
      <td><p-skeleton width="5rem" /></td>
      <td><p-skeleton width="8rem" /></td>
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td colspan="7" class="text-center p-8">
        <div class="flex flex-col items-center gap-3">
          <i class="pi pi-book text-4xl text-gray-400"></i>
          <p class="text-gray-500 m-0">No hay asignaturas registradas</p>
          <p-button label="Nueva Asignatura" icon="pi pi-plus" (onClick)="nuevaAsignatura()" />
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
