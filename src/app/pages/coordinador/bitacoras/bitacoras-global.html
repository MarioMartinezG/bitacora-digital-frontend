<p-toast />

<p-toolbar styleClass="mb-6">
  <ng-template #start>
    <div class="flex items-center gap-3 flex-wrap">
      <p-select
        [options]="tutorOptions()"
        [ngModel]="filtroTutor()"
        (ngModelChange)="onFiltroTutorChange($event)"
        optionLabel="label"
        optionValue="value"
        placeholder="Filtrar por tutor"
        styleClass="w-60"
      />
      @if (filtroTutor() !== null) {
        <p-button
          label="Limpiar filtro"
          icon="pi pi-filter-slash"
          severity="secondary"
          [outlined]="true"
          size="small"
          (onClick)="limpiarFiltros()"
        />
      }
    </div>
  </ng-template>
</p-toolbar>

<p-table
  #dt
  [value]="estudiantesFiltrados()"
  [rows]="10"
  [paginator]="true"
  [rowsPerPageOptions]="[10, 25, 50]"
  [globalFilterFields]="['estudianteNombre', 'estudianteCorreo', 'tutorNombre']"
  [loading]="cargando()"
  [rowHover]="true"
  [tableStyle]="{ 'min-width': '55rem' }"
  [showCurrentPageReport]="true"
  currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} estudiantes"
>
  <ng-template #caption>
    <div class="flex items-center justify-between">
      <h5 class="m-0">Bitácoras de Estudiantes</h5>
      <p-iconfield>
        <p-inputicon styleClass="pi pi-search" />
        <input pInputText type="text"
               (input)="dt.filterGlobal($any($event.target).value, 'contains')"
               placeholder="Buscar estudiante..." />
      </p-iconfield>
    </div>
  </ng-template>

  <ng-template #header>
    <tr>
      <th pSortableColumn="estudianteNombre" style="min-width: 14rem">
        Estudiante <p-sortIcon field="estudianteNombre" />
      </th>
      <th pSortableColumn="tutorNombre" style="min-width: 12rem">
        Tutor <p-sortIcon field="tutorNombre" />
      </th>
      <th pSortableColumn="porcentajeGeneral" style="min-width: 14rem">
        Progreso <p-sortIcon field="porcentajeGeneral" />
      </th>
      <th style="min-width: 6rem">Acciones</th>
    </tr>
  </ng-template>

  <ng-template #body let-estudiante>
    <tr>
      <td>
        <div>
          <span class="font-semibold">{{ estudiante.estudianteNombre }}</span>
          <div class="text-sm text-surface-500">{{ estudiante.estudianteCorreo }}</div>
        </div>
      </td>
      <td>{{ estudiante.tutorNombre || 'Sin asignar' }}</td>
      <td>
        <div class="flex items-center gap-3">
          <p-progressbar
            [value]="estudiante.porcentajeGeneral"
            [showValue]="false"
            styleClass="h-2 flex-1"
          />
          <p-tag
            [value]="estudiante.porcentajeGeneral.toFixed(0) + '%'"
            [severity]="getProgresoSeverity(estudiante.porcentajeGeneral)"
            [rounded]="true"
          />
        </div>
      </td>
      <td>
        <p-button
          icon="pi pi-book"
          [rounded]="true"
          [outlined]="true"
          severity="info"
          (click)="verBitacora(estudiante)"
          pTooltip="Ver bitácora"
        />
      </td>
    </tr>
  </ng-template>

  <ng-template #loadingbody>
    <tr>
      <td><p-skeleton /></td>
      <td><p-skeleton /></td>
      <td><p-skeleton /></td>
      <td><p-skeleton shape="circle" size="2.5rem" /></td>
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td colspan="4" class="text-center p-8">
        <div class="flex flex-col items-center gap-3">
          <i class="pi pi-book text-4xl text-gray-400"></i>
          <p class="text-gray-500 m-0">No se encontraron estudiantes</p>
          @if (filtroTutor() !== null) {
            <p-button label="Limpiar filtro" icon="pi pi-filter-slash" size="small" (onClick)="limpiarFiltros()" />
          }
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
