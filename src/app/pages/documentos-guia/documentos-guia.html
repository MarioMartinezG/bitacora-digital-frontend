<div class="card">

  <!-- Header -->
  <div class="flex items-center gap-3 mb-6">
    <i class="pi pi-file-pdf text-3xl text-primary"></i>
    <div>
      <h2 class="text-xl font-semibold text-surface-900 dark:text-surface-0 m-0">Documentos guía del curso</h2>
      <p class="text-muted-color m-0 mt-1">
        Materiales de apoyo para el curso <strong>En sus marcas, listos, ¡RAC!</strong>. Haz clic en un documento para descargarlo.
      </p>
    </div>
  </div>

  <!-- Lista de documentos -->
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    @for (doc of documentos; track doc.nombre) {
      <a
        [href]="doc.url"
        [attr.download]="doc.nombre"
        class="flex items-center gap-4 p-5 border border-surface-200 dark:border-surface-700 rounded-xl hover:border-primary hover:shadow-md transition-all duration-200 no-underline group"
      >
        <div class="flex items-center justify-center w-14 h-14 rounded-xl bg-red-50 dark:bg-red-900/20 flex-shrink-0">
          <i class="pi pi-file-pdf text-red-500 text-3xl"></i>
        </div>
        <div class="flex flex-col flex-1 min-w-0">
          <span class="font-semibold text-surface-900 dark:text-surface-0 text-sm leading-snug group-hover:text-primary transition-colors duration-200">
            {{ doc.label }}
          </span>
          <span class="text-xs text-surface-400 mt-1">PDF · Descargar</span>
        </div>
        <i class="pi pi-download text-surface-400 group-hover:text-primary transition-colors duration-200 flex-shrink-0"></i>
      </a>
    }
  </div>

</div>
