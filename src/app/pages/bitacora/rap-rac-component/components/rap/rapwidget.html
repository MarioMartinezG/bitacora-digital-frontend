<!-- Pregunta principal -->
<div class="mb-4">
    <label for="rapPregunta" class="block font-semibold text-lg mb-2">
        ¿Cuáles son los Resultados de Aprendizaje del Programa?
    </label>
    <p class="text-color-secondary mb-3">
        Agrega los resultados uno por uno.
    </p>
</div>

<!-- Campo de entrada + boton -->
<div class="flex align-items-center gap-3 mb-4">
    <input
        id="rapInput"
        type="text"
        pInputText
        [(ngModel)]="nuevoResultado"
        placeholder="Escribe un resultado..."
        class="w-full"
        (keyup.enter)="agregarResultado()" />
    <button
        pButton
        label="Agregar"
        icon="pi pi-plus"
        (click)="agregarResultado()"
        [disabled]="!nuevoResultado.trim()"
        class="p-button-primary">
    </button>
</div>

<!-- Lista de resultados -->
@if (resultados.length > 0) {
    <div class="flex flex-col gap-2 mt-2">
        @for (resultado of resultados; track $index) {
            <div class="flex items-center justify-between p-3 border-round surface-ground">
                <span class="text-sm">{{ resultado }}</span>
                <button
                    pButton
                    icon="pi pi-trash"
                    class="p-button-text p-button-danger p-button-sm"
                    pTooltip="Eliminar"
                    tooltipPosition="left"
                    (click)="eliminarResultado($index)">
                </button>
            </div>
        }
    </div>
} @else {
    <p-message severity="info" text="Aún no has agregado resultados."></p-message>
}
