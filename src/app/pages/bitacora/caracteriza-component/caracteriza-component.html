<app-loading></app-loading>
<p-fluid>

    <div class="flex mt-8">
        <p-card class="w-full">
            <p-fieldset legend="Identificación de la asignatura" [toggleable]="true">
                <div class="card flex flex-col gap-4">
                    <div class="grid grid-cols-12 gap-4 grid-cols-12 gap-2">
                        <label for="name3"
                            class="flex items-center col-span-12 mb-2 md:col-span-2 md:mb-0">Programa</label>
                        <div class="col-span-12 md:col-span-10">
                            <p-autoComplete [(ngModel)]="selectedAutoValue" [suggestions]="autoFilteredValue"
                                optionLabel="name" placeholder="Buscar programa" dropdown
                                (completeMethod)="filterPrograms($event)">
                            </p-autoComplete>
                        </div>
                    </div>
                    <div class="grid grid-cols-12 gap-4 grid-cols-12 gap-2">
                        <label for="email3" class="flex items-center col-span-12 mb-2 md:col-span-2 md:mb-0">Nombre de
                            asignatura</label>
                        <div class="col-span-12 md:col-span-10">
                            <input pInputText id="email3" type="text" />
                        </div>
                    </div>
                    <div class="grid grid-cols-12 gap-4 gap-2">
                        <label for="tipoAsignatura" class="flex items-center col-span-12 mb-2 md:col-span-2 md:mb-0">
                            Tipo de asignatura
                        </label>
                        <div class="col-span-12 md:col-span-10">
                            <p-select id="tipoAsignatura" [(ngModel)]="selectedTipoAsignatura"
                                [options]="tiposAsignatura" optionLabel="name" placeholder="Seleccione un tipo"
                                class="w-full" required>
                            </p-select>
                        </div>
                    </div>

                    <div class="grid grid-cols-12 gap-4">
                        <!-- Semestre -->
                        <label for="semestre" class="flex items-center col-span-12 md:col-span-2">
                            Semestre
                        </label>
                        <div class="col-span-12 md:col-span-4">
                            <p-inputNumber id="semestre" [(ngModel)]="semestre" mode="decimal" [min]="1" [max]="12"
                                showButtons placeholder="Ingrese el semestre" class="w-full">
                            </p-inputNumber>
                        </div>

                        <!-- Periodo Académico -->
                        <label for="periodoAcademico" class="flex items-center col-span-12 md:col-span-2">
                            Periodo Académico
                        </label>
                        <div class="col-span-12 md:col-span-4">
                            <p-select id="periodoAcademico" [(ngModel)]="selectedPeriodo" [options]="periodos"
                                optionLabel="name" placeholder="Seleccione un periodo" class="w-full">
                            </p-select>
                        </div>

                        <!-- Prerrequisito -->
                        <label for="prerequisito" class="flex items-center col-span-12 md:col-span-2">
                            Prerrequisito
                        </label>
                        <div class="col-span-12 md:col-span-4">
                            <p-toggleButton id="prerequisito" [(ngModel)]="prerequisitoValue" onLabel="Sí" offLabel="No"
                                class="w-full">
                            </p-toggleButton>
                        </div>

                        <!-- Materia Prerrequisito -->
                        <label for="materiaPrereq" class="flex items-center col-span-12 md:col-span-2">
                            Materia Prerrequisito
                        </label>
                        <div class="col-span-12 md:col-span-4">
                            <input pInputText id="materiaPrereq" type="text" placeholder="Ej: Álgebra Lineal"
                                [(ngModel)]="materiaPrerequisito" [disabled]="!prerequisitoValue" class="w-full" />
                        </div>
                    </div>


                    <div class="grid grid-cols-12 gap-4">
                        <!-- Número de créditos -->
                        <label for="creditos" class="flex items-center col-span-12 md:col-span-2">
                            Número de créditos
                        </label>
                        <div class="col-span-12 md:col-span-4">
                            <p-inputNumber id="creditos" [(ngModel)]="numeroCreditos" [min]="1" [max]="32"
                                showButtons="true" mode="decimal" (onInput)="calcularHoras($event)" class="w-full">
                            </p-inputNumber>
                        </div>

                        <!-- Total horas de trabajo -->
                        <label for="horas" class="flex items-center col-span-12 md:col-span-2">
                            Total horas de trabajo
                        </label>
                        <div class="col-span-12 md:col-span-4">
                            <p-inputNumber id="horas" [ngModel]="totalHoras" [readonly]="true" mode="decimal"
                                class="w-full">
                            </p-inputNumber>
                        </div>

                        <!-- Horas de trabajo directo -->
                        <label for="horasDirecto" class="flex items-center col-span-12 md:col-span-2">
                            Horas de trabajo directo
                        </label>
                        <div class="col-span-12 md:col-span-4">
                            <p-inputNumber id="horasDirecto" [(ngModel)]="horasDirecto" [min]="0" [max]="totalHoras"
                                mode="decimal" placeholder="Ej: 24" (onInput)="validarHoras()" class="w-full">
                            </p-inputNumber>
                        </div>

                        <!-- Horas de trabajo independiente -->
                        <label for="horasIndependiente" class="flex items-center col-span-12 md:col-span-2">
                            Horas de trabajo independiente
                        </label>
                        <div class="col-span-12 md:col-span-4">
                            <p-inputNumber id="horasIndependiente" [(ngModel)]="horasIndependiente" [min]="0"
                                [max]="totalHoras" mode="decimal" placeholder="Ej: 72" (onInput)="validarHoras()"
                                class="w-full">
                            </p-inputNumber>
                        </div>
                    </div>

                    <!-- Mensaje de validación -->
                    @if (errorHoras) {
                    <div class="text-red-500 mt-2">
                        <p-message severity="error">
                            La suma de horas directas e independientes debe ser exactamente {{ totalHoras }}.
                        </p-message>
                    </div>
                    }

                </div>
            </p-fieldset>

        </p-card>

    </div>


    <div class="flex mt-8">
        <p-card header="Información Académica" class="w-full">
            <p-accordion [value]="['0']" [multiple]="true">
                <p-accordion-panel value="0">
                    <p-accordion-header>
                        <div class="flex items-center justify-between w-full">
                            <span>Equipo Docente</span>
                            <p-tag severity="success" value="Completado" class="mr-2"></p-tag>
                        </div>
                    </p-accordion-header>

                    <p-accordion-content>

                        <p class="m-0">
                            <app-teachingstaffwidget></app-teachingstaffwidget>
                        </p>
                    </p-accordion-content>
                </p-accordion-panel>
                <p-accordion-panel value="1">
                    <p-accordion-header>
                        <div class="flex items-center justify-between w-full">
                            <span>Justificación</span>
                            <p-tag severity="warn" value="En desarrollo" class="mr-2"></p-tag>
                        </div>
                    </p-accordion-header>
                    <p-accordion-content>
                        <p class="m-0">
                            <app-justificationwidget></app-justificationwidget>
                        </p>
                    </p-accordion-content>
                </p-accordion-panel>
                <p-accordion-panel value="2">
                    <p-accordion-header>
                        <div class="flex items-center justify-between w-full">
                            <span>Contenidos</span>
                            <p-tag severity="danger" value="Sin avances" class="mr-2"></p-tag>
                        </div>
                    </p-accordion-header>
                    <p-accordion-content>
                        <p class="m-0">
                            <app-contentwidget></app-contentwidget>
                    </p-accordion-content>
                </p-accordion-panel>
            </p-accordion>

        </p-card>
    </div>

</p-fluid>
