@if (userRole === 1) {
    <div class="grid grid-cols-12 gap-8">
        <div class="col-span-12">
            <app-timeline-widget />
        </div>

        <div class="col-span-12">
            <app-generalprogress-widget [secciones]="secciones"/>
        </div>

        <!-- Tarjeta tutor asignado -->
        <div class="col-span-12">
            <div class="border border-surface-200 dark:border-surface-700 rounded-xl bg-surface-0 dark:bg-surface-900 px-5 py-4 flex items-center gap-4">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    <div class="flex-shrink-0">
                        <i class="pi pi-user text-primary-500 text-xl"></i>
                    </div>
                    <div class="min-w-0">
                        <p class="text-xs text-surface-400 m-0 mb-1">Tutor asignado</p>
                        @if (cargandoTutor()) {
                            <div class="flex gap-2 items-center">
                                <div class="h-4 w-32 bg-surface-200 dark:bg-surface-700 rounded animate-pulse"></div>
                                <div class="h-3 w-44 bg-surface-200 dark:bg-surface-700 rounded animate-pulse"></div>
                            </div>
                        } @else if (tutorAsignado()) {
                            <div class="flex flex-wrap items-center gap-3">
                                <div class="flex items-center gap-2">
                                    <div class="w-8 h-8 rounded-full bg-primary-100 dark:bg-primary-900 flex items-center justify-center text-primary-700 dark:text-primary-300 font-bold text-xs flex-shrink-0">
                                        {{ getIniciales(tutorAsignado()!.nombreTutor) }}
                                    </div>
                                    <span class="font-semibold text-sm text-surface-900 dark:text-surface-0">{{ tutorAsignado()!.nombreTutor }}</span>
                                </div>
                                <span class="text-sm text-surface-400">{{ tutorAsignado()!.correoTutor }}</span>
                            </div>
                        } @else {
                            <p class="text-sm text-surface-400 italic m-0">Aún no tienes un tutor asignado</p>
                        }
                    </div>
                </div>
            </div>
        </div>
        <div class="col-span-12 xl:col-span-6">
            <app-moduleprogress-widget [secciones]="secciones"/>
        </div>
        <div class="col-span-12 xl:col-span-6">
            <app-notifications-widget />
        </div>
    </div>
} @else {
    <div class="grid grid-cols-12 gap-8">
        <div class="col-span-12 xl:col-span-8">
            <app-student-progress-summary />
        </div>
        <div class="col-span-12 xl:col-span-4">
            <app-notifications-widget />
        </div>
    </div>
}
