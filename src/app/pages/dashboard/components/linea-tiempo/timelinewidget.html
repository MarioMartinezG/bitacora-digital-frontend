<div class="card flex flex-col gap-4">
  @if (cargando()) {
    <div class="flex gap-6 overflow-hidden">
      @for (i of [1, 2, 3, 4]; track i) {
        <div class="flex flex-col gap-2 flex-1">
          <p-skeleton height="1rem" />
          <p-skeleton height="0.5rem" width="60%" />
        </div>
      }
    </div>
  } @else if (schedule().length === 0) {
    <p class="text-surface-400 text-sm text-center m-0">No hay momentos configurados</p>
  } @else {
    <p-timeline [value]="schedule()" layout="horizontal" align="top">
      <ng-template #opposite let-item>
        {{ item.date }}
      </ng-template>
      <ng-template #content let-item>
        {{ item.moment }}
      </ng-template>
    </p-timeline>
  }
</div>
